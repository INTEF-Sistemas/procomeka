name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Download eXeLearning static editor
        run: make download-exelearning-editor

      - name: Build static preview
        working-directory: apps/frontend
        env:
          PREVIEW_STATIC: "true"
          PREVIEW_BASE: "/procomeka/"
        run: bun run build:preview

      - name: Deploy to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/frontend/dist
          destination_dir: .
          keep_files: true
