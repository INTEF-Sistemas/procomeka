name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static preview
        working-directory: apps/frontend
        env:
          PREVIEW_STATIC: "true"
          PREVIEW_BASE: "/procomeka/pr-preview/pr-${{ github.event.pull_request.number }}/"
        run: bun run build:preview

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: apps/frontend/dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto

  cleanup:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: apps/frontend/dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
